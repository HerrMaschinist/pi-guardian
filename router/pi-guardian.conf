server {
    listen 3001;
    server_name 192.168.50.10;
    server_tokens off;

    client_max_body_size 1m;
    charset utf-8;

    root /home/alex/pi-guardian/ui/dist;
    index index.html;

    access_log /var/log/nginx/pi-guardian.access.log;
    error_log  /var/log/nginx/pi-guardian.error.log;

    # LAN-only access
    allow 192.168.50.0/24;
    deny all;

    # SPA-Routing: alle unbekannten Pfade auf index.html
    location / {
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri $uri/ /index.html;
    }

    # API-Proxy zum FastAPI-Router
    location /api/ {
        proxy_pass         http://127.0.0.1:8071/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }
}
