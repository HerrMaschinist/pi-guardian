server {
    listen 3001;
    server_name 192.168.50.10;

    root /home/Alex/pi-guardian-ui/dist;
    index index.html;

    access_log /var/log/nginx/pi-guardian.access.log;
    error_log  /var/log/nginx/pi-guardian.error.log;

    # LAN-only access
    allow 192.168.50.0/24;
    deny all;

    # SPA-Routing: alle unbekannten Pfade auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API-Proxy zum FastAPI-Router
    location /api/ {
        proxy_pass         http://127.0.0.1:8071/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
